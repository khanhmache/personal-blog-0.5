version: '3.8'

services:
  nginx:
    build: .
    container_name: personal-blog-0.5
    ports:
     - "${NGINX_PORT:-8080}:80"
    volumes:
      - nginx-logs:/var/log/nginx
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - blog-net

  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - blog-net

networks:
  blog-net:
    driver: bridge

volumes:
  nginx-logs:
