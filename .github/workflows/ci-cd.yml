name: CI/CD Pipeline - Personal Blog 0.5

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: khanhmache/personal-blog-0.5:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Nginx configuration
        run: |
          docker run --rm -v $(pwd)/nginx/nginx.conf:/etc/nginx/nginx.conf:ro nginx:alpine nginx -t

      - name: Run healthcheck test
        run: |
          echo "✅ Docker image built successfully!"
          echo "✅ Nginx config syntax is valid!"
          echo "🚀 Project is ready for deployment"

      - name: Show summary
        run: |
          echo "========================================"
          echo "🎉 CI/CD Pipeline completed successfully!"
          echo "Project: Personal Blog Level 0.5"
          echo "Status: Build & Test Passed"
          echo "========================================"
